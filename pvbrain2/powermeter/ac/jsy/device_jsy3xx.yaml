modbus_controller:
  - id: ${powermeter_name}_modbus_controller
    address: ${powermeter_address}
    modbus_id: ${powermeter_modbus_id}
    command_throttle: ${powermeter_throttle}
    setup_priority: -10
    update_interval: ${powermeter_update_interval}
   
sensor:

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_a_voltage
    id: ${powermeter_name}_phase_a_voltage
    register_type: holding
    address: 0x0100
    unit_of_measurement: 'V'
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 1
    icon: mdi:sine-wave
    filters:
      - multiply: 0.01     # value = DATA / 100

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_b_voltage
    id: ${powermeter_name}_phase_b_voltage
    register_type: holding
    address: 0x0101
    unit_of_measurement: 'V'
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 1
    icon: mdi:sine-wave
    filters:
      - multiply: 0.01     # value = DATA / 100

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_c_voltage
    id: ${powermeter_name}_phase_c_voltage
    register_type: holding
    address: 0x0102
    unit_of_measurement: 'V'
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 1
    icon: mdi:sine-wave
    filters:
      - multiply: 0.01     # value = DATA / 100 

  # ── Currents ──────────────────────────────────────────────────────────────

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_a_current
    id: ${powermeter_name}_phase_a_current
    register_type: holding
    address: 0x0103
    unit_of_measurement: 'A'
    device_class: current
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 1
    icon: mdi: current-ac
    filters:
      - multiply: 0.01     # value = DATA / 100

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_b_current
    id: ${powermeter_name}_phase_b_current
    register_type: holding
    address: 0x0104
    unit_of_measurement: 'A'
    device_class: current
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 1
    icon: mdi: current-ac
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_c_current
    id: ${powermeter_name}_phase_c_current
    register_type: holding
    address: 0x0105
    unit_of_measurement: 'A'
    device_class: current
    state_class: measurement
    value_type: U_WORD
    accuracy_decimals: 1
    icon: mdi: current-ac
    filters:
      - multiply: 0.01

  # ── Active Power (per phase, unit = W, value = DATA) ─────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_a_active_power
    id: ${powermeter_name}_phase_a_active_power
    register_type: holding
    address: 0x0106
    unit_of_measurement: 'W'
    device_class: power
    state_class: measurement
    value_type: U_WORD
    icon: mdi: power
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_b_active_power
    id: ${powermeter_name}_phase_b_active_power
    register_type: holding
    address: 0x0107
    unit_of_measurement: 'W'
    device_class: power
    state_class: measurement
    value_type: U_WORD
    icon: mdi: power
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_phase_c_active_power
    id: ${powermeter_name}_phase_c_active_power
    register_type: holding
    address: 0x0108
    unit_of_measurement: 'W'
    device_class: power
    state_class: measurement
    value_type: U_WORD
    icon: mdi: power
    accuracy_decimals: 1

  # Three-phase total active power – 32-bit (0x0109 high word, 0x010A low word)
  - platform: modbus_controller
    modbus_controller_id: ${powermeter_name}_modbus_controller
    name: ${name}_${powermeter_name}_total_active_power
    id: ${powermeter_name}_totalpower_total
    register_type: holding
    address: 0x0109
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    value_type: U_DWORD      # reads 2 consecutive registers (high word first per manual)
    accuracy_decimals: 0
    
